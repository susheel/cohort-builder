schemaVersion: "1.0"
id: "ad-v1"
title: "AD Knowledge Portal - v1.0 Variable Set"
description: "AD Knowledge Portal - v1.0 Variable Set. Compiled from the 'AD v1.0' sheet of the ELITE Cohort Builder workbook. The AD sheet contains no Sensitive (Binary) or Sensitivity (Rank) data. Sensitivity was inferred from variable name heuristics: variables starting with 'has'/'is' or matching known-sensitive names were assigned High; all others default to Low. These assignments should be reviewed before production use. Variable count: 50."
primaryEntity: subjects
relationships:
  - from: subjects
    to: files
    via: subject_files
    fromKey: subject_id
    toKey: syn_id
variables:
  - name: ageDeath
    label: Age Death
    category: Other
    sensitivity: Low
    sensitive: false
    entity: subjects
    column: age_death
    widget: bins
    bins:
      - label: "<70"
        min: 0
        max: 69
      - label: "70-74"
        min: 70
        max: 74
      - label: "75-79"
        min: 75
        max: 79
      - label: "80-84"
        min: 80
        max: 84
      - label: "85-89"
        min: 85
        max: 89
      - label: 90+
        min: 90
        max: 200
    note: Range selection (BINNED)
  - name: sex
    label: Sex
    category: Other
    sensitivity: Low
    sensitive: false
    entity: subjects
